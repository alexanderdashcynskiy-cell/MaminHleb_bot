<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProductCard — Мамин Хлеб</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      padding: 40px 20px;
      background: #F0E8DC;
      font-family: 'Montserrat', sans-serif;
    }

    /* ──────────────────────────────────────────────────
       CARD  —  fixed height, image fills the whole card
       as a background layer, content floats on top
    ────────────────────────────────────────────────── */
    .pc {
      position: relative;
      width: 155px;
      height: 230px;
      border-radius: 22px;
      overflow: hidden;
      box-shadow:
        0 2px 6px  rgba(45,21,5,0.06),
        0 8px 24px rgba(45,21,5,0.12),
        0 20px 48px rgba(45,21,5,0.08);
      cursor: pointer;
      flex-shrink: 0;
      transition: transform 0.30s cubic-bezier(0.34,1.56,0.64,1),
                  box-shadow 0.30s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .pc:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow:
        0 4px 10px  rgba(45,21,5,0.08),
        0 16px 40px rgba(45,21,5,0.16),
        0 32px 64px rgba(45,21,5,0.10);
    }

    /* ── Photo layer: fills the entire card ── */
    .pc__photo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
      z-index: 0;
      /* subtle warm tint to enhance food photography */
      filter: saturate(1.08) brightness(1.03);
    }

    /* ── Gradient fade: the core transition effect ──
       Covers the bottom 55% of the card.
       Fades from fully transparent (over the food photo)
       to solid white (the content zone).
       This makes photo and content feel like ONE shape. */
    .pc__fade {
      position: absolute;
      left: 0; right: 0;
      bottom: 0;
      height: 58%;           /* 134px of 230px */
      background: linear-gradient(
        to bottom,
        hsla(0,0%,100%,0)    0%,    /* fully transparent — still seeing photo */
        hsla(0,0%,100%,0.15) 18%,
        hsla(0,0%,100%,0.50) 38%,   /* midpoint: photo softening */
        hsla(0,0%,100%,0.82) 58%,
        hsla(0,0%,100%,1)    78%,   /* fully white — content begins */
        hsla(0,0%,100%,1)    100%
      );
      /* soft blur at the transition zone only */
      backdrop-filter: blur(1.5px);
      -webkit-backdrop-filter: blur(1.5px);
      z-index: 1;
      pointer-events: none;
    }

    /* ── "Хит" badge ── */
    .pc__badge {
      position: absolute;
      top: 10px; left: 10px;
      z-index: 3;
      background: linear-gradient(135deg, #C9A227, #E8B430);
      color: #fff;
      font-size: 9px;
      font-weight: 800;
      padding: 3px 10px;
      border-radius: 99px;
      letter-spacing: 0.04em;
      box-shadow: 0 2px 8px rgba(201,162,39,0.50);
      pointer-events: none;
    }

    /* ── Out-of-stock overlay ── */
    .pc__oos {
      position: absolute;
      inset: 0;
      background: rgba(20,10,5,0.48);
      z-index: 4;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 22px;
    }
    .pc__oos p {
      color: #fff;
      font-weight: 800;
      font-size: 9px;
      text-align: center;
      line-height: 1.6;
    }

    /* ── Content: sits in the white gradient zone ── */
    .pc__body {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 43%;           /* 99px — the solid white zone */
      z-index: 2;
      padding: 6px 12px 12px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .pc__name {
      font-weight: 700;
      font-size: 12px;
      color: #2d1505;
      line-height: 1.28;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      padding-right: 44px;   /* room for the + button */
    }

    .pc__weight {
      font-size: 10px;
      color: #A08060;
      margin-top: 2px;
      line-height: 1;
    }

    .pc__footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .pc__price {
      font-size: 15px;
      font-weight: 800;
      color: #2d1505;
      line-height: 1;
    }
    .pc__price--sale { color: #D94F3C; }
    .pc__price sub {
      font-size: 10px;
      font-weight: 600;
      vertical-align: baseline;
    }

    /* ── Add-to-cart button ── */
    .pc__btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #C9A227, #E8B430);
      color: #fff;
      font-weight: 800;
      font-size: 22px;
      line-height: 1;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(201,162,39,0.52);
      transition: transform 0.14s ease, box-shadow 0.14s ease;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }
    .pc__btn:active { transform: scale(0.88); box-shadow: 0 2px 8px rgba(201,162,39,0.38); }

    /* ── Quantity pill ── */
    .pc__qty {
      display: flex; align-items: center; gap: 2px;
      background: rgba(255,251,245,0.97);
      border-radius: 50px;
      padding: 3px;
      border: 1px solid rgba(201,162,39,0.22);
      box-shadow: 0 3px 12px rgba(0,0,0,0.12);
    }
    .pc__qty-btn {
      width: 24px; height: 24px;
      border-radius: 50%;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 13px;
      flex-shrink: 0;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.12s ease;
    }
    .pc__qty-btn:active { transform: scale(0.85); }
    .pc__qty-btn--m { background: #EDE0C4; color: #6B4423; }
    .pc__qty-btn--p { background: linear-gradient(135deg,#C9A227,#E8B430); color: #fff; box-shadow: 0 2px 6px rgba(201,162,39,0.42); }
    .pc__qty-n {
      min-width: 14px; text-align: center;
      font-weight: 800; font-size: 11px; color: #2d1505;
    }
  </style>
</head>
<body>

  <!-- Demo cards ─────────────────────────────── -->

  <!-- 1. default state -->
  <div id="c-piroshki" class="pc" onclick="">
    <img class="pc__photo"
      src="https://images.unsplash.com/photo-1509440159596-0249088772ff?w=400&q=85"
      alt="Пирожок с мясом">
    <div class="pc__fade"></div>
    <div class="pc__badge">Хит</div>
    <div class="pc__body">
      <div>
        <p class="pc__name">Пирожок с мясом</p>
        <p class="pc__weight">90 г</p>
      </div>
      <div class="pc__footer">
        <p class="pc__price">1.75 <sub>Б</sub></p>
        <button class="pc__btn" onclick="add('piroshki',event)">+</button>
      </div>
    </div>
  </div>

  <!-- 2. already in cart -->
  <div id="c-khachapuri" class="pc">
    <img class="pc__photo"
      src="https://images.unsplash.com/photo-1565958011703-44f9829ba187?w=400&q=85"
      alt="Хачапури">
    <div class="pc__fade"></div>
    <div class="pc__badge">Хит</div>
    <div class="pc__body">
      <div>
        <p class="pc__name">Хачапури</p>
        <p class="pc__weight">90 г</p>
      </div>
      <div class="pc__footer">
        <p class="pc__price">2.10 <sub>Б</sub></p>
        <!-- qty pill rendered by JS init below -->
      </div>
    </div>
  </div>

  <!-- 3. out of stock -->
  <div id="c-cappuccino" class="pc" style="opacity:0.62;">
    <img class="pc__photo"
      src="https://images.unsplash.com/photo-1572442388796-11668a67e53d?w=400&q=85"
      alt="Капучино">
    <div class="pc__fade"></div>
    <div class="pc__oos"><p>Закончился 🔥<br>Завтра будет</p></div>
    <div class="pc__body">
      <div>
        <p class="pc__name">Капучино</p>
        <p class="pc__weight">300 мл</p>
      </div>
      <div class="pc__footer">
        <p class="pc__price" style="color:#bbb;">3.00 <sub>Б</sub></p>
        <span style="font-size:9px;color:#ccc;">Нет в наличии</span>
      </div>
    </div>
  </div>

  <script>
    /* ── Cart state ─────────────────────────────────────── */
    const _cart = {};

    function add(id, e) {
      e && e.stopPropagation();
      _cart[id] = 1;
      _render(id);
    }

    function delta(id, d, e) {
      e && e.stopPropagation();
      _cart[id] = Math.max(0, (_cart[id] || 0) + d);
      _render(id);
    }

    function _render(id) {
      const footer = document.querySelector(`#c-${id} .pc__footer`);
      if (!footer) return;
      const qty = _cart[id] || 0;
      const btn = footer.querySelector('.pc__btn');
      const pill = footer.querySelector('.pc__qty');

      if (qty <= 0) {
        if (pill) pill.remove();
        if (!btn) {
          const b = document.createElement('button');
          b.className = 'pc__btn';
          b.textContent = '+';
          b.onclick = e => add(id, e);
          footer.appendChild(b);
        }
        return;
      }

      if (btn) btn.remove();

      if (pill) {
        pill.querySelector('.pc__qty-n').textContent = qty;
      } else {
        const p = document.createElement('div');
        p.className = 'pc__qty';
        p.innerHTML = `
          <button class="pc__qty-btn pc__qty-btn--m" onclick="delta('${id}',-1,event)">−</button>
          <span class="pc__qty-n">${qty}</span>
          <button class="pc__qty-btn pc__qty-btn--p" onclick="delta('${id}',1,event)">+</button>`;
        footer.appendChild(p);
      }
    }

    /* init khachapuri as already in cart (qty 2) */
    _cart['khachapuri'] = 2;
    _render('khachapuri');


    /* ══════════════════════════════════════════════════════
       REUSABLE FACTORY
       Creates and returns a .pc element ready to append.
       ══════════════════════════════════════════════════════ */
    function createProductCard({
      id,
      name,
      weight   = '',
      price,
      salePrice = null,
      imageUrl,
      badge    = '',
      inStock  = true,
      quantity = 0,
    }) {
      const fmt = n => Number(n).toFixed(2);
      const el  = document.createElement('div');
      el.id        = `c-${id}`;
      el.className = 'pc';
      if (!inStock) el.style.opacity = '0.62';

      const priceHTML = salePrice && salePrice < price
        ? `<p class="pc__price pc__price--sale">${fmt(salePrice)} <sub>Б</sub></p>`
        : `<p class="pc__price">${fmt(price)} <sub>Б</sub></p>`;

      const ctaHTML = inStock
        ? `<button class="pc__btn" onclick="add('${id}',event)">+</button>`
        : `<span style="font-size:9px;color:#ccc;">Нет в наличии</span>`;

      el.innerHTML = `
        <img class="pc__photo" src="${imageUrl}" alt="${name}" loading="lazy">
        <div class="pc__fade"></div>
        ${badge   ? `<div class="pc__badge">${badge}</div>` : ''}
        ${!inStock ? `<div class="pc__oos"><p>Закончился 🔥<br>Завтра будет</p></div>` : ''}
        <div class="pc__body">
          <div>
            <p class="pc__name">${name}</p>
            ${weight ? `<p class="pc__weight">${weight}</p>` : ''}
          </div>
          <div class="pc__footer">
            ${priceHTML}
            ${ctaHTML}
          </div>
        </div>`;

      if (inStock && quantity > 0) {
        _cart[id] = quantity;
        requestAnimationFrame(() => _render(id));
      }

      return el;
    }
  </script>
</body>
</html>
