name: Security Audit

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  security:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: npm audit (fail on high)
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: secretlint
        # Явно указываем пакет правил — иначе npx установит только саму CLI без preset
        run: |
          npx --yes \
            --package secretlint \
            --package @secretlint/secretlint-rule-preset-recommend \
            secretlint "**/*.{js,json}"
        continue-on-error: true

      - name: ESLint (security ruleset)
        # Явно устанавливаем все нужные пакеты — bot/package.json не содержит devDependencies
        run: |
          npx --yes \
            --package eslint \
            --package @eslint/js \
            --package eslint-plugin-security \
            eslint --config eslint.config.security.js bot/
        continue-on-error: true

      - name: Run audit.sh (regression guards)
        run: |
          chmod +x audit.sh
          ./audit.sh --ci
